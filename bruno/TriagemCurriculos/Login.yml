info:
  name: Login
  type: http
  seq: 3

http:
  method: POST
  url: "{{urlApi}}/auth/login"
  body:
    type: json
    data: |-
      {
        "Email":"marlonfd@gmail.com",
        "Password":"marlon@123;"
      }
  auth: inherit

runtime:
  actions:
    - type: set-variable
      phase: after-response
      selector:
        expression: res.body.token
        method: jsonq
      variable:
        name: bearerTokenLogin
        scope: runtime

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
